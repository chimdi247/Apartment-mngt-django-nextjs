services:
  api:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: estate_prod_api
    container_name: estate_prod_api
    volumes:
      - estate_prod_staticfiles:/app/staticfiles
    expose:
      - "5000"
    env_file:
      - ./.envs/.env.example
    depends_on:
      - postgres
      - mailpit
      - redis
    command: /start
    networks:
      - estate_prod_nw

  postgres:
    image: postgres:15-alpine
    container_name: estate_prod_postgres
    ports:
      - "5432:5432"
    volumes:
      - estate_prod_postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.envs/.env.example
    networks:
      - estate_prod_nw

  mailpit:
    image: axllent/mailpit:v1.15
    container_name: estate_prod_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - estate_prod_mailpit_data:/data
    networks:
      - estate_prod_nw

  redis:
    image: redis:7.0-alpine3.19
    container_name: estate_redis
    volumes:
      - estate_redis_prod_data:/data
    networks:
      - estate_prod_nw

  celeryworker:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: estate_prod_celeryworker
    container_name: estate_prod_celeryworker
    volumes:
      - estate_prod_staticfiles:/app/staticfiles
    command: /start-celeryworker
    depends_on:
      - api
    networks:
      - estate_prod_nw

  celerybeat:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: estate_prod_celerybeat
    container_name: estate_prod_celerybeat
    volumes:
      - estate_prod_staticfiles:/app/staticfiles
    command: /start-celerybeat
    depends_on:
      - api
    networks:
      - estate_prod_nw

  flower:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: estate_prod_flower
    container_name: estate_prod_flower
    ports:
      - "5555:5555"
    volumes:
      - estate_prod_staticfiles:/app/staticfiles
    command: /start-flower
    depends_on:
      - api
    networks:
      - estate_prod_nw

  nginx:
    build:
      context: ./docker/local/nginx
      dockerfile: Dockerfile
    container_name: estate_nginx
    ports:
      - "8080:80"
    volumes:
      - estate_prod_staticfiles:/app/staticfiles
      - logs_store:/var/log/nginx
    depends_on:
      - api
    networks:
      - estate_prod_nw

networks:
  estate_prod_nw:
    driver: bridge

volumes:
  estate_prod_staticfiles: {}
  estate_prod_postgres_data: {}
  estate_prod_mailpit_data: {}
  estate_redis_prod_data: {}
  logs_store: {}